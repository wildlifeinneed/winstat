<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>decision.js browser smoke check</title>
<style>
  body { font-family: ui-monospace, monospace; padding: 16px; background: #f5f2ec; }
  pre  { background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 8px;
         white-space: pre-wrap; }
  .pass { color: #1e6b3a; }
  .fail { color: #c0392b; font-weight: 700; }
</style>
</head>
<body>
<h1>decision.js — browser smoke check</h1>
<p>Loads <code>../docs/assets/decision.js</code> and runs the same table cases as
   <code>tests/test_decision.js</code>. Open via <code>python3 -m http.server</code>
   from the repo root, then visit <code>/tests/decision_test.html</code>.</p>
<pre id="out">running…</pre>

<script src="../docs/assets/decision.js"></script>
<script>
(function () {
  var out = document.getElementById('out');
  var lines = [];
  var passed = 0, failed = 0;

  function bk(t, a, m) { return { total: t, available: a, marginal_volunteers: m || [] }; }
  function cap(n, r, c) { return { ct_no_rvs: n, ct_rvs: r, courier: c }; }

  var DEFS = {
    marginal_threshold: 1,
    ct_rvs_capture_min_available: 1,
    ct_any_capture_min_available: 1,
    courier_transport_min_available: 1
  };

  var cases = [
    ['missing capacity', undefined, true,  'capture',   DEFS, 'tbd_escalate',     null],
    ['B1 ct_rvs healthy', cap(bk(0,0), bk(1,1,[{name:'A',availability_note:'M-F'}]), bk(0,0)),
                                          true,  'capture',   DEFS, 'connecteam_task',  'ct_rvs'],
    ['B2 ct_rvs empty',   cap(bk(0,0), bk(0,0), bk(0,0)), true,  'capture',   DEFS, 'call_pa_game_comm', null],
    ['C1 non-rvs ct_no_rvs', cap(bk(5,3), bk(0,0), bk(0,0)), false, 'capture', DEFS, 'connecteam_task', 'ct_any'],
    ['C2 non-rvs both empty', cap(bk(1,0), bk(1,0), bk(0,0)), false, 'capture', DEFS, 'call_pa_game_comm', null],
    ['D1 transport courier', cap(bk(0,0), bk(0,0), bk(3,2)), true, 'transport', DEFS, 'connecteam_task', 'courier'],
    ['D2 transport fallback', cap(bk(2,2), bk(0,0), bk(1,0)), true, 'transport', DEFS, 'connecteam_task', 'ct_any'],
    ['D3 transport none',     cap(bk(1,0), bk(1,0), bk(1,0)), false,'transport', DEFS, 'call_pa_game_comm', null],
    ['E unknown issue',       cap(bk(2,2), bk(2,2), bk(2,2)), true, 'unknown',   DEFS, 'tbd_escalate', null],
    ['Threshold-bumped fail', cap(bk(0,0), bk(5,2), bk(0,0)), true, 'capture',
       { marginal_threshold:1, ct_rvs_capture_min_available:3,
         ct_any_capture_min_available:1, courier_transport_min_available:1 },
       'call_pa_game_comm', null]
  ];

  if (!window.WildlifeDecision || typeof window.WildlifeDecision.recommend !== 'function') {
    out.innerHTML = '<span class="fail">FAIL: window.WildlifeDecision missing — UMD wrapper broken.</span>';
    return;
  }

  cases.forEach(function (row) {
    var name = row[0], cap_ = row[1], rvs = row[2], iss = row[3], cfg = row[4];
    var expA = row[5], expT = row[6];
    var got = window.WildlifeDecision.recommend(cap_, rvs, iss, cfg);
    var ok = (got.action === expA) && (got.target === expT);
    if (ok) { passed++; lines.push('<span class="pass">PASS</span> ' + name); }
    else    { failed++; lines.push('<span class="fail">FAIL</span> ' + name +
              ' — got action=' + got.action + ', target=' + got.target +
              ' / expected action=' + expA + ', target=' + expT); }
  });

  lines.push('');
  lines.push((failed === 0 ? '<span class="pass">' : '<span class="fail">') +
             passed + ' passed, ' + failed + ' failed</span>');
  out.innerHTML = lines.join('\n');
})();
</script>
</body>
</html>
