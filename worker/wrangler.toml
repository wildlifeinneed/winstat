# Cloudflare Worker config for the Dispatcher aggregate endpoint.
#
# SCAFFOLD ONLY -- this is NOT deployed yet. Deploy happens later (Phase
# E-deploy / Phase F) once a scoped token is provided. See worker/README.md.
#
# IMPORTANT:
#   * NO secrets live in this file. CLOUDFLARE_API_TOKEN is supplied to
#     `wrangler` via the environment at deploy time, never committed.
#   * The KV namespace `id` below is a PLACEHOLDER. Create the real namespace
#     at deploy time (`wrangler kv:namespace create VOLUNTEER_COORDS`) and paste
#     the returned id here (or use `--kv-namespace` flags) -- do NOT commit a
#     real id.
#   * account_id is NOT hardcoded here. Supply it at deploy via the
#     CLOUDFLARE_ACCOUNT_ID env var or `wrangler --account-id <id>`.
#     (The real account id is recorded in worker/README.md deploy notes, not in
#     committed Worker code.)

name = "pa-wildlife-dispatcher"
main = "src/index.mjs"
compatibility_date = "2024-09-23"
account_id = "290463cfd0bc273076e8c62678f7c845"

# Origins allowed to call this Worker (CORS). COMMA-SEPARATED allowlist:
#   * production GitHub Pages site, AND
#   * Cloudflare Pages dev-preview deployments (*.pages.dev wildcard).
# The Worker echoes back whichever listed origin the request actually came from
# (ACAO names a single origin); with no/unknown Origin it falls back to the
# first entry (production). The "*" only matches within the host portion.
# TODO(deploy): if a custom Pages project domain is used, add it here too.
[vars]
ALLOWED_ORIGIN = "https://wildlifeinneed.github.io,https://*.pages.dev"
# OpenRouteService Matrix API key for DRIVING distances on the PUBLIC rehabber
# top-3 panel. Provided ONLY as a Worker SECRET, never in [vars]:
#     wrangler secret put ORS_API_KEY
# It MUST NOT appear in [vars]: a same-named [vars] entry overrides/clobbers the
# secret on deploy (Wrangler treats them as one binding namespace). While unset,
# the /?mode=rehabber_distances route degrades gracefully to haversine
# straight-line distances (duration_min: null) — the panel never breaks.
#
# Shared password for the policy editor save endpoint. Set as a Worker SECRET:
#     wrangler secret put POLICY_PASSWORD
# The policy editor prompts the admin for this password on first save. It MUST
# NOT appear in [vars] (same override concern as ORS_API_KEY).

# PRIVATE volunteer coords store. The Phase F refresh job writes the coords
# array (JSON) under key `volunteer_coords`. id is a PLACEHOLDER -- replace at
# deploy time with the real namespace id; do NOT create/commit a real one now.
[[kv_namespaces]]
binding = "VOLUNTEER_COORDS"
id = "43bdd5e237544683b20cdbc61d42dd49"
