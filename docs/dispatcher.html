<!DOCTYPE html>
<!-- For local development, run: cd docs && python3 -m http.server 8000  -- some browsers block fetch() of file:// JSON. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wildlife In Need PA — Dispatcher</title>
  <meta name="description" content="Dispatcher console for routing wildlife emergencies to available volunteers by county and role." />
  <meta name="theme-color" content="#154d2a" />
  <link rel="icon" type="image/jpeg" href="assets/winlogo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #1e6b3a;
      --green-dark:  #154d2a;
      --green-deep:  #0e3a1f;
      --green-light: #e8f5ed;
      --amber:       #d4730a;
      --amber-light: #fff3e0;
      --red:         #c0392b;
      --red-light:   #fdecea;
      --bg:          #f5f2ec;
      --surface:     #ffffff;
      --border:      #e2dcd4;
      --text:        #1a1a1a;
      --text-muted:  #6b6560;
      --text-light:  #9e9892;
      --radius:      10px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.06);
      --shadow-lg:   0 8px 24px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.06);
      --transition:  0.18s ease;
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header (matches facilities.html) ───────────────────── */
    .site-header {
      background: var(--green-dark);
      color: #fff;
      padding: 20px 16px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      color: rgba(255,255,255,.8);
      text-decoration: none;
      margin-bottom: 10px;
      transition: color var(--transition);
    }
    .home-link:hover { color: #fff; text-decoration: underline; }
    .header-inner {
      max-width: 880px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .header-icon {
      flex-shrink: 0;
      width: 60px; height: 60px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon img { max-width: 100%; max-height: 100%; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,.35)); }
    .header-text h1 {
      font-family: 'Bitter', Georgia, serif;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .header-text p { font-size: 12.5px; opacity: 0.78; margin-top: 3px; }

    /* ─── Refresh banner ─────────────────────────────────────── */
    .refresh-banner {
      max-width: 880px;
      margin: 12px auto 0;
      padding: 8px 14px;
      background: var(--green-light);
      border: 1px solid #c8e6d2;
      border-radius: 8px;
      font-size: 13px;
      color: var(--green-dark);
    }
    .refresh-banner.warn {
      background: var(--amber-light);
      border-color: #f0c070;
      color: #7a4900;
    }

    /* ─── Main layout ────────────────────────────────────────── */
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 18px 16px 48px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    label.field-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    select, input[type=text] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14.5px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color var(--transition);
    }
    select:focus { border-color: var(--green); background: #fff; }

    /* ─── Capacity cards ─────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 4px;
    }
    @media (max-width: 640px) {
      .cards-grid { grid-template-columns: 1fr; }
    }

    .cap-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 16px 14px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 120px;
    }
    .cap-card .role {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .cap-card .num {
      font-family: 'Bitter', Georgia, serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--green-deep);
      line-height: 1.15;
    }
    .cap-card .num .total { color: var(--text-muted); font-weight: 600; font-size: 20px; }
    .cap-card .sub { font-size: 12.5px; color: var(--text-muted); }
    .cap-card .badge {
      align-self: flex-start;
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 999px;
      background: var(--amber-light);
      color: var(--amber);
      border: 1px solid #f0c070;
    }
    .cap-card.empty .num { color: var(--text-light); }

    /* ─── Form ─────────────────────────────────────────────── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 14px;
    }
    @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }

    .radio-group { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
    .radio-group label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--green);
      color: #fff;
      border: none;
      padding: 11px 22px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--transition);
    }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:disabled { background: var(--text-light); cursor: not-allowed; }

    /* ─── Modal / placeholder ───────────────────────────────── */
    .rec-output {
      margin-top: 14px;
      padding: 14px 16px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: 14px;
      color: var(--text);
      display: none;
      max-height: 60vh;
      overflow-y: auto;
      position: relative;
    }
    .rec-output.show { display: block; }

    .rec-dismiss {
      position: absolute;
      top: 8px;
      right: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .rec-dismiss:hover { background: var(--bg); color: var(--text); }

    .rec-action {
      font-family: 'Bitter', Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 8px;
      margin: 4px 60px 12px 0;
    }
    .rec-action.go {
      background: var(--green-light);
      color: var(--green-deep);
      border-left: 4px solid var(--green);
    }
    .rec-action.escalate {
      background: var(--amber-light);
      color: #7a4900;
      border-left: 4px solid var(--amber);
    }
    .rec-action.unknown {
      background: #ececec;
      color: #444;
      border-left: 4px solid var(--text-light);
    }

    .rec-target {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .rec-target strong { color: var(--text); }

    .rec-marginal {
      background: var(--amber-light);
      border: 1px solid #f0c070;
      border-left: 4px solid var(--amber);
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .rec-marginal-header {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 6px;
    }
    .rec-marginal ul { list-style: disc; padding-left: 20px; font-size: 13.5px; }
    .rec-marginal li { margin-bottom: 3px; }
    .rec-marginal em { color: var(--text-muted); font-size: 12.5px; }

    .rec-reasoning-header {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .rec-reasoning ol { padding-left: 20px; font-size: 13.5px; color: var(--text); }
    .rec-reasoning li { margin-bottom: 3px; }

    .empty-msg {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-top: 8px;
      font-style: italic;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    .site-footer {
      background: #0a2915;
      color: rgba(255,255,255,.6);
      padding: 22px 16px;
      text-align: center;
      font-size: 12.5px;
    }
    .site-footer .footer-logo {
      width: 44px; height: auto; margin: 0 auto 8px; display: block; opacity: .9;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner" style="flex-direction:column; gap:6px;">
    <a class="home-link" href="index.html">← Back to WIN home</a>
    <div style="display:flex; align-items:center; gap:14px;">
      <div class="header-icon"><img src="assets/winlogo.jpg" alt="Wildlife In Need PA logo" /></div>
      <div class="header-text">
        <h1>Dispatcher Console</h1>
        <p>Route a wildlife emergency to the right volunteer by county and role.</p>
      </div>
    </div>
  </div>
</header>

<div id="refresh-banner" class="refresh-banner">Loading snapshot…</div>

<main>
  <section class="panel">
    <label class="field-label" for="county">County</label>
    <select id="county" aria-label="County">
      <option value="">— select a county —</option>
    </select>

    <div class="cards-grid" style="margin-top:16px;">
      <div class="cap-card empty" data-role="ct_no_rvs">
        <div class="role">C&amp;T (no RVS)</div>
        <div class="num"><span class="avail">—</span> / <span class="total">—</span> <span style="font-size:12.5px; color:var(--text-muted); font-weight:500;">available</span></div>
        <div class="sub"></div>
      </div>
      <div class="cap-card empty" data-role="ct_rvs">
        <div class="role">C&amp;T (with RVS)</div>
        <div class="num"><span class="avail">—</span> / <span class="total">—</span> <span style="font-size:12.5px; color:var(--text-muted); font-weight:500;">available</span></div>
        <div class="sub"></div>
      </div>
      <div class="cap-card empty" data-role="courier">
        <div class="role">Courier</div>
        <div class="num"><span class="avail">—</span> / <span class="total">—</span> <span style="font-size:12.5px; color:var(--text-muted); font-weight:500;">available</span></div>
        <div class="sub"></div>
      </div>
    </div>
    <div id="empty-msg" class="empty-msg" style="display:none;"></div>
  </section>

  <section class="panel">
    <div class="form-row">
      <div>
        <label class="field-label">Animal is RVS?</label>
        <div class="radio-group" id="rvs-group">
          <label><input type="radio" name="rvs" value="yes" /> Yes</label>
          <label><input type="radio" name="rvs" value="no" checked /> No</label>
        </div>
      </div>
      <div>
        <label class="field-label">Issue</label>
        <div class="radio-group" id="issue-group">
          <label><input type="radio" name="issue" value="capture" checked /> Capture</label>
          <label><input type="radio" name="issue" value="transport" /> Transport</label>
        </div>
      </div>
    </div>

    <button id="recommend-btn" class="btn-primary" type="button">Get Recommendation</button>

    <div id="rec-output" class="rec-output" role="status" aria-live="polite"></div>
  </section>
</main>

<footer class="site-footer">
  <img class="footer-logo" src="assets/winlogo.jpg" alt="Wildlife In Need PA" />
  <p>Wildlife In Need PA · Dispatcher (internal tool)</p>
</footer>

<script src="assets/decision.js"></script>
<script src="assets/dispatcher.js"></script>
</body>
</html>
