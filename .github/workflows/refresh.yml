# Scheduled refresh of docs/data/county_capacity.json from Monday.com.
#
# Cron is 10:00 UTC daily. That maps to 06:00 America/New_York during EDT
# (Mar-Nov) and 05:00 during EST (Nov-Mar). GitHub Actions cron runs in
# UTC only, so the wall-clock time in PA shifts by an hour twice a year.
# If you want it pinned to "always 6am Eastern", you'd need two cron
# entries gated by month — not worth the complexity right now.
name: Refresh wildlife capacity snapshot

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh capacity snapshot
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: |
          python3 refresh_monday.py --if-stale

      - name: Commit + push if changed
        run: |
          if git diff --quiet docs/data/county_capacity.json docs/data/.last_remote_update; then
            echo "No changes — Monday tracker not advanced. Skipping commit."
            exit 0
          fi
          git config user.name  "wildlife-dispatcher-bot"
          git config user.email "dispatcher-bot@users.noreply.github.com"
          git add docs/data/county_capacity.json docs/data/.last_remote_update
          ts="$(date -u +'%Y-%m-%d %H:%M UTC')"
          git commit -m "Auto-refresh capacity snapshot (${ts})"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 3
          done

  # ---------------------------------------------------------------------------
  # Phase F — dispatcher data refresh + private-dataset push to Cloudflare KV.
  #
  # Gated by the VolDB_Status sentinel (refresh_sentinel.needs_refresh) so the
  # large Monday boards are only pulled when the tracker has actually advanced.
  # On a refresh it:
  #   * runs refresh_monday.py (volunteers+rehabbers+coordinators, geocodes,
  #     writes the PRIVATE coords dataset + the PUBLIC docs/data/* aggregates),
  #   * pushes ONLY the PRIVATE volunteer coords to Cloudflare KV under the
  #     exact key the Worker reads (`volunteer_coords`, per worker/src/handler.js),
  #   * commits ONLY the public docs/data/* aggregates (NEVER the private coords),
  #   * records the sentinel date so the next run can compare.
  #
  # NOTE: the rehabber dataset (docs/data/rehabbers.json) is PUBLIC in this repo
  # (committed + served by GitHub Pages, NOT read from KV by the Worker), so it
  # is committed like the other public aggregates and is NOT pushed to KV. The
  # ONLY private, KV-served dataset is volunteer_coords (data/volunteer_coords.json).
  refresh-dispatcher-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node (for wrangler KV push)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Sentinel gate. Writes refresh=true|false to $GITHUB_OUTPUT. needs_refresh
      # is fail-safe: any Monday API error returns False (no download), so a
      # tracker hiccup can never trigger an expensive pull nor fail the run.
      - name: Sentinel — does VolDB_Status require a refresh?
        id: sentinel
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          import refresh_sentinel as rs

          token = os.environ["MONDAY_API_TOKEN"]
          stored = rs.DEFAULT_STORED_PATH
          decision = rs.needs_refresh(token, stored)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"refresh={'true' if decision else 'false'}\n")
          print(f"needs_refresh -> {decision}")
          PY

      - name: Refresh Monday datasets
        if: steps.sentinel.outputs.refresh == 'true'
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: |
          python3 refresh_monday.py

      # Push ONLY the PRIVATE volunteer coords to Cloudflare KV under the exact
      # key the Worker reads. wrangler is used (not the REST API): the repo
      # already ships worker/wrangler.toml with account_id + the VOLUNTEER_COORDS
      # namespace, so `wrangler kv key put` needs no hand-built auth headers —
      # it picks up CLOUDFLARE_API_TOKEN from the env automatically and the
      # namespace id is passed explicitly. Cleaner + less error-prone than a
      # raw curl PUT to the KV REST endpoint.
      - name: Push private volunteer coords to Cloudflare KV
        if: steps.sentinel.outputs.refresh == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 290463cfd0bc273076e8c62678f7c845
        run: |
          if [ ! -f data/volunteer_coords.json ]; then
            echo "ERROR: data/volunteer_coords.json missing after refresh." >&2
            exit 1
          fi
          npx --yes wrangler@3 kv key put \
            --namespace-id=43bdd5e237544683b20cdbc61d42dd49 \
            volunteer_coords \
            --path=data/volunteer_coords.json

      # Commit ONLY the public, PII-free aggregates. The private coords
      # (data/volunteer_coords.json) and the sentinel date file are gitignored,
      # so a `git add` of these explicit public paths can never include them.
      #
      # Defence-in-depth PII guard: even though we only `git add` an explicit
      # allow-list of public paths, before committing we (a) assert the staged
      # diff touches ONLY that allow-list (no private/gitignored path slipped
      # in), and (b) scan the staged content of the coordinator/rehabber files
      # for PII-shaped keys (phone/email/address/street) that must never reach
      # the public site. Either check failing aborts the push with a non-zero
      # exit so a bad refresh can never publish volunteer PII.
      - name: Commit + push public aggregates if changed
        if: steps.sentinel.outputs.refresh == 'true'
        run: |
          set -euo pipefail

          # Explicit public allow-list. NEVER add data/volunteer_coords.json
          # or any other private/PII path here.
          #
          # docs/data/facilities.json is the BASE-facility dataset for
          # docs/facilities.html (Option A join-at-read). It carries PUBLIC
          # facility addresses the page already displays — NOT volunteer PII —
          # so it is committed like the other public aggregates. Its companion
          # facility_name_map.json (Monday abbreviation -> full facility name)
          # is hand-maintained but committed here too so a name-map edit made
          # alongside a board change is published on the same refresh.
          PUBLIC_PATHS="docs/data/county_capacity.json \
            docs/data/.last_remote_update \
            docs/data/rehabbers.json \
            docs/data/coordinators.json \
            docs/data/facilities.json \
            docs/data/facility_name_map.json"

          if git diff --quiet -- $PUBLIC_PATHS; then
            echo "No public-aggregate changes to commit."
            exit 0
          fi

          git config user.name  "wildlife-dispatcher-bot"
          git config user.email "dispatcher-bot@users.noreply.github.com"
          git add $PUBLIC_PATHS

          # (a) Allow-list assertion: the staged set must be a subset of the
          # public paths. If ANY other path is staged (e.g. a private file was
          # accidentally un-gitignored), abort before committing or pushing.
          ALLOWED_RE='^docs/data/(county_capacity\.json|\.last_remote_update|rehabbers\.json|coordinators\.json|facilities\.json|facility_name_map\.json)$'
          staged="$(git diff --cached --name-only)"
          bad_paths="$(printf '%s\n' "$staged" | grep -Ev "$ALLOWED_RE" || true)"
          if [ -n "$bad_paths" ]; then
            echo "ABORT: staged diff touches non-public path(s):" >&2
            printf '%s\n' "$bad_paths" >&2
            git reset -q
            exit 1
          fi

          # Belt-and-braces: the private coords file must never be staged.
          if printf '%s\n' "$staged" | grep -qx 'data/volunteer_coords.json'; then
            echo "ABORT: private volunteer coords staged for public commit." >&2
            git reset -q
            exit 1
          fi

          # (b) PII content scan of the staged additions. The public rehabber +
          # coordinator datasets must contain NO volunteer phone/email/street/
          # address keys. Scan added lines (leading '+') for those JSON keys.
          #
          # SCOPE: facilities.json is intentionally EXCLUDED — it is the public
          # facility-address dataset (name/address/city/state/zip are public org
          # data the page already shows), so its address/zip keys are expected
          # and must not abort the push. The scan stays active on the rehabber +
          # coordinator files, which are the volunteer-PII surfaces.
          PII_SCAN_PATHS="docs/data/rehabbers.json docs/data/coordinators.json"
          added="$(git diff --cached -- $PII_SCAN_PATHS | grep -E '^\+' || true)"
          if printf '%s\n' "$added" | grep -Eiq '"(phone|phone_number|cell|mobile|email|e_mail|street|address|address1|address_line|home_address|zip|postal)"[[:space:]]*:'; then
            echo "ABORT: staged public diff contains a PII-shaped key (phone/email/address/etc.)." >&2
            git reset -q
            exit 1
          fi

          ts="$(date -u +'%Y-%m-%d %H:%M UTC')"
          git commit -m "Auto-refresh dispatcher data (${ts})"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 3
          done

      # Record the sentinel date so the next run compares against it. Written
      # to a gitignored file (never committed). Runs only on a successful
      # refresh so a failed pull doesn't advance the cache.
      - name: Update stored sentinel date
        if: steps.sentinel.outputs.refresh == 'true'
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          import refresh_sentinel as rs

          token = os.environ["MONDAY_API_TOKEN"]
          d = rs.get_last_updated(token)
          if d is None:
              print("Sentinel date unreadable post-refresh; leaving stored date unchanged.")
          else:
              rs.save_stored_date(d, rs.DEFAULT_STORED_PATH)
              print(f"Stored sentinel date -> {d.isoformat()}")
          PY
